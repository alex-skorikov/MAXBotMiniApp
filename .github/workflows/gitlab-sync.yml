name: Sync to GitLab

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.email "ci@github"
          git config --global user.name "GitHub CI"

      - name: Add GitLab remote
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.digital-era.ru/4.alex.skorikov/maxbotminiapp.git

      - name: Pull GitLab main
        run: |
          git pull gitlab main --no-edit || true

      - name: Push merged result to GitLab
        run: |
          git push gitlab main
