<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>MAX WebApp — Поиск патентов</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>

    <script src="https://cdn.max.ru/webapps/max-web-app.js"></script>
</head>

<body>
<div class="container">
    <h2>Поиск патентов</h2>
    <p>Введите ключевые слова для поиска:</p>

    <input id="query" placeholder="например: нейросеть обработка изображений" />

    <button onclick="search()">Искать</button>

    <div id="result" style="margin-top:20px;"></div>
</div>

<script>
    async function search() {
        const query = document.getElementById("query").value;

        document.getElementById("result").innerHTML = "Ищу патенты…";

        // пример запроса к твоему backend
        const response = await fetch("https://maxbotminiapp-production.up.railway.app/api/search?query=" + encodeURIComponent(query));
        const data = await response.json();

        document.getElementById("result").innerHTML =
            "<h3>Результаты:</h3>" +
            "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
    }
</script>

</body>
</html>
